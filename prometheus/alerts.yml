---
groups:
  - name: toolkit_alerts
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"

      - alert: HighCPU
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU on {{ $labels.instance }}: {{ $value | printf "%.1f" }}%'

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"} / node_filesystem_size_bytes{fstype!~"tmpfs|devtmpfs"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'Low disk on {{ $labels.instance }}: {{ $value | printf "%.1f" }}% free'
